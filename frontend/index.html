<!DOCTYPE html>
<html>
<head>
    <title>Student Survival Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎓 Student Survival Hub</h1>

    <section>
        <h2>📋 Academic Task Manager</h2>

        <input type="text" id="taskTitle" placeholder="Task Title">

        <select id="taskPriority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <input type="date" id="taskDueDate">

        <button onclick="addTask()">Add Task</button>

        <ul id="taskList"></ul>
    </section>

    <section>
        <h2>📚 Exam Survival Planner</h2>

        <input type="text" id="courseName" placeholder="Course Name">
        <input type="date" id="examDate">
        <input type="number" id="studyHours" placeholder="Daily Study Hours">

        <button onclick="generatePlan()">Generate Study Plan</button>

        <p id="studyPlan"></p>
    </section>

    <section>
        <h2>🚨 Panic Meter</h2>
        <p id="panicLevel">Current Panic Level: 🟢 Relaxed</p>
    </section>

    <section>
        <h2>🤖 Survival Bot</h2>
        <p id="botMessage">Welcome Student!</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
