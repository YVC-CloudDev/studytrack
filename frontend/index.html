<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyTrack</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>StudyTrack</h1>
          <p>Tasks · Exams · Panic, all in one place</p>
        </div>
      </div>
    </header>

    <main class="container single-layout">
      <section class="panic-card">
        <div>
          <p class="label">DEADLINE PANIC METER</p>
          <h2 id="panicTitle">Relaxed</h2>
          <p id="panicMessage">You're doing fine. Keep going.</p>
        </div>

        <div class="score">
          <span id="panicScore">0</span>
          <small>/ 100</small>
        </div>

        <div class="panic-bar">
          <div id="panicFill"></div>
        </div>

        <div class="scale">
          <span>🟢 RELAXED</span>
          <span>🟡 WARNING</span>
          <span>🔴 PANIC</span>
          <span>⚫ CRITICAL</span>
        </div>
      </section>

      <section class="panel tasks-panel">
        <div class="panel-head">
          <div>
            <h2>Academic Tasks</h2>
            <p>
              <span id="taskPendingSmall">0</span> pending ·
              <span id="taskDoneSmall">0</span> done
            </p>
          </div>
        </div>

        <div class="form">
          <input id="taskTitle" placeholder="Task title" />
          <input id="taskCourse" placeholder="Course" />

          <select id="taskPriority">
            <option value="High">High priority</option>
            <option value="Medium">Medium priority</option>
            <option value="Low">Low priority</option>
          </select>

          <input type="date" id="taskDueDate" />

          <button id="saveTaskBtn" onclick="saveTask()">+ New</button>
          <button
            id="cancelTaskBtn"
            onclick="cancelTaskEdit()"
            style="display: none"
          >
            Cancel
          </button>
        </div>

        <div id="taskList" class="list"></div>
      </section>

      <section class="panel exams-panel">
        <div class="panel-head">
          <div>
            <h2>Exam StudyTrack</h2>
            <p>Auto-generated study sessions until exam day.</p>
          </div>
        </div>

        <div class="form">
          <input id="courseName" placeholder="Course name" />
          <input type="date" id="examDate" />

          <select id="examDifficulty">
            <option value="Hard">Hard</option>
            <option value="Medium">Medium</option>
            <option value="Easy">Easy</option>
          </select>

          <input type="number" id="studyHours" placeholder="Hours/day" />

          <button id="saveExamBtn" onclick="saveExam()">+ Exam</button>
          <button
            id="cancelExamBtn"
            onclick="cancelExamEdit()"
            style="display: none"
          >
            Cancel
          </button>
        </div>

        <div id="examList" class="exam-grid"></div>

        <h3>STUDY SCHEDULE</h3>
        <div id="studySchedule" class="schedule"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
